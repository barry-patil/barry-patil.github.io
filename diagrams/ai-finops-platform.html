<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI FinOps Platform — Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif}
.bar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(0,0,0,.95);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;backdrop-filter:blur(12px)}
.bl{display:flex;align-items:center;gap:10px}
.bt{color:#fff;font-size:14px;font-weight:600}
.bg{color:#3b82f6;font-size:11px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);padding:3px 9px;border-radius:4px}
.bb{color:#3b82f6;font-size:13px;text-decoration:none;border:1px solid rgba(59,130,246,.4);padding:7px 16px;border-radius:6px;transition:.2s}
.bb:hover{background:#3b82f6;color:#fff}
.ctrl{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:6px}
.cb{width:36px;height:36px;background:#0d0d0d;border:1px solid #222;border-radius:8px;color:#777;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.cb:hover{background:#141414;border-color:#3b82f6;color:#3b82f6}
.hint{position:fixed;bottom:28px;left:24px;color:#252525;font-size:11px;z-index:100;line-height:1.9}
#cv{display:block;width:100vw;height:calc(100vh - 52px);margin-top:52px;cursor:grab}
#cv:active{cursor:grabbing}
.fe{stroke-dasharray:8 5;animation:fl 1.8s linear infinite}
@keyframes fl{to{stroke-dashoffset:-26}}
.ng{cursor:pointer}
.ng:hover .nr{filter:drop-shadow(0 0 14px var(--glow,#3b82f6));stroke-width:2.5}
.ng:hover text{fill:#fff!important}
.tip{position:fixed;background:#0d0d0d;border:1px solid #2a2a2a;color:#bbb;padding:9px 13px;border-radius:8px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;max-width:260px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.tip.on{opacity:1}
</style></head><body>
<div class="bar">
  <div class="bl"><span class="bt">AI FinOps Platform</span><span class="bg">Kafka · Python · Grafana · EKS</span></div>
  <a href="https://barry-patil.github.io/#projects" class="bb">← Portfolio</a>
</div>
<div class="ctrl">
  <button class="cb" id="zi">+</button>
  <button class="cb" id="zo">−</button>
  <button class="cb" id="zr" style="font-size:12px">⌖</button>
</div>
<div class="hint">Scroll to zoom · Drag to pan · Hover nodes for details</div>
<div class="tip" id="tp"></div>
<svg id="cv" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a-blue"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
  <marker id="a-green"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e"/></marker>
  <marker id="a-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f97316"/></marker>
  <marker id="a-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a855f7"/></marker>
  <marker id="a-red"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
  <marker id="a-cyan"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#06b6d4"/></marker>
  <marker id="a-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>
</defs>
<g id="dg">
<path d="M180,106.0 C220.0,106.0 220.0,166.0 260,166.0" fill="none" stroke="#f97316" stroke-width="1.5" class="fe" marker-end="url(#a-orange)"/><text x="220.0" y="126.0" text-anchor="middle" fill="#444" font-size="10">metrics stream</text>
<path d="M180,226.0 C220.0,226.0 220.0,166.0 260,166.0" fill="none" stroke="#f97316" stroke-width="1.5" class="fe" marker-end="url(#a-orange)"/><text x="220.0" y="186.0" text-anchor="middle" fill="#444" font-size="10">spend data</text>
<path d="M400,166.0 C440.0,166.0 440.0,166.0 480,166.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/>
<path d="M620,166.0 C660.0,166.0 660.0,86.0 700,86.0" fill="none" stroke="#a855f7" stroke-width="1.5" class="fe" marker-end="url(#a-purple)"/><text x="660.0" y="116.0" text-anchor="middle" fill="#444" font-size="10">remote write</text>
<path d="M770.0,112 C770.0,112 770.0,180 770.0,180" fill="none" stroke="#22c55e" stroke-width="1.5" class="fe" marker-end="url(#a-green)"/>
<path d="M840,86.0 C880.0,86.0 880.0,86.0 920,86.0" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/><text x="880.0" y="76.0" text-anchor="middle" fill="#444" font-size="10">fire alerts</text>
<path d="M840,206.0 C880.0,206.0 880.0,206.0 920,206.0" fill="none" stroke="#22c55e" stroke-width="1.5" class="fe" marker-end="url(#a-green)"/>
<path d="M1000.0,112 C1000.0,112 1000.0,180 1000.0,180" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/>
<g class="ng" data-tip="NVIDIA DCGM Exporter — streams GPU utilisation metrics (compute, memory, temperature) per node" style="--glow:#f97316"><rect class="nr" x="40" y="80" width="140" height="52" rx="8" fill="#1f1000" stroke="#f97316" stroke-width="1.5"/><text x="110.0" y="103.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">DCGM</text><text x="110.0" y="118.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">Exporter</text></g>
<g class="ng" data-tip="AWS Cost Explorer API — pulls daily spend per service, tag, and linked account" style="--glow:#f97316"><rect class="nr" x="40" y="200" width="140" height="52" rx="8" fill="#1f1000" stroke="#f97316" stroke-width="1.5"/><text x="110.0" y="223.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">AWS Cost</text><text x="110.0" y="238.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">Explorer</text></g>
<g class="ng" data-tip="Apache Kafka on EKS — 3 brokers, topics per metric type, 7-day retention" style="--glow:#3b82f6"><rect class="nr" x="260" y="140" width="140" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="330.0" y="163.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Kafka</text><text x="330.0" y="178.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Cluster</text></g>
<g class="ng" data-tip="Python consumer — enriches metrics with team/project labels, remote-writes to Prometheus" style="--glow:#a855f7"><rect class="nr" x="480" y="140" width="140" height="52" rx="8" fill="#150a28" stroke="#a855f7" stroke-width="1.5"/><text x="550.0" y="163.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">Python</text><text x="550.0" y="178.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">Consumer</text></g>
<g class="ng" data-tip="Prometheus with Thanos sidecar — long-term metric storage in S3, multi-cluster federation" style="--glow:#22c55e"><rect class="nr" x="700" y="60" width="140" height="52" rx="8" fill="#0a1f12" stroke="#22c55e" stroke-width="1.5"/><text x="770.0" y="83.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">Prometheus</text><text x="770.0" y="98.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">+ Thanos</text></g>
<g class="ng" data-tip="Grafana — GPU utilisation per team, cost per model run, budget burn-rate dashboards" style="--glow:#22c55e"><rect class="nr" x="700" y="180" width="140" height="52" rx="8" fill="#0a1f12" stroke="#22c55e" stroke-width="1.5"/><text x="770.0" y="203.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">Grafana</text><text x="770.0" y="218.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">Dashboards</text></g>
<g class="ng" data-tip="Alertmanager — routes budget-overage alerts to Slack channels and PagerDuty on-call" style="--glow:#ef4444"><rect class="nr" x="920" y="60" width="160" height="52" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1.5"/><text x="1000.0" y="83.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">Alertmanager</text><text x="1000.0" y="98.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">→ Slack / PD</text></g>
<g class="ng" data-tip="EKS — hosts all platform services; GPU node groups with IRSA for Cost Explorer access" style="--glow:#3b82f6"><rect class="nr" x="920" y="180" width="160" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="1000.0" y="203.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">EKS</text><text x="1000.0" y="218.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Cluster</text></g>
</g>
</svg>
<script>
const sv=document.getElementById('cv'),g=document.getElementById('dg'),tp=document.getElementById('tp');
let sc=1,tx=0,ty=0,dr=false,lx=0,ly=0;
function aT(){g.setAttribute('transform',`translate(${tx},${ty}) scale(${sc})`);}
sv.addEventListener('wheel',e=>{e.preventDefault();const r=sv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,d=e.deltaY>0?.88:1.12,ns=Math.max(.1,Math.min(6,sc*d));tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;aT();},{passive:false});
sv.addEventListener('mousedown',e=>{if(!e.target.closest('.ng')){dr=true;lx=e.clientX;ly=e.clientY;}});
window.addEventListener('mousemove',e=>{if(!dr)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;aT();});
window.addEventListener('mouseup',()=>dr=false);
document.getElementById('zi').onclick=()=>{sc=Math.min(6,sc*1.2);aT();};
document.getElementById('zo').onclick=()=>{sc=Math.max(.1,sc/1.2);aT();};
document.getElementById('zr').onclick=()=>{sc=1;tx=0;ty=0;aT();};
window.addEventListener('load',()=>{const b=g.getBBox(),sw=sv.clientWidth,sh=sv.clientHeight;sc=Math.min(sw/(b.width+160),sh/(b.height+160),1.5);tx=(sw-b.width*sc)/2-b.x*sc;ty=(sh-b.height*sc)/2-b.y*sc;aT();});
document.querySelectorAll('.ng[data-tip]').forEach(n=>{n.addEventListener('mouseenter',()=>{tp.textContent=n.dataset.tip;tp.classList.add('on');});n.addEventListener('mousemove',e=>{tp.style.left=(e.clientX+16)+'px';tp.style.top=(e.clientY-8)+'px';});n.addEventListener('mouseleave',()=>tp.classList.remove('on'));});
</script></body></html>
