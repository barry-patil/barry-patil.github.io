<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CI/CD Pipeline Comparison — Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif}
.bar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(0,0,0,.95);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;backdrop-filter:blur(12px)}
.bl{display:flex;align-items:center;gap:10px}
.bt{color:#fff;font-size:14px;font-weight:600}
.bg{color:#3b82f6;font-size:11px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);padding:3px 9px;border-radius:4px}
.bb{color:#3b82f6;font-size:13px;text-decoration:none;border:1px solid rgba(59,130,246,.4);padding:7px 16px;border-radius:6px;transition:.2s}
.bb:hover{background:#3b82f6;color:#fff}
.ctrl{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:6px}
.cb{width:36px;height:36px;background:#0d0d0d;border:1px solid #222;border-radius:8px;color:#777;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.cb:hover{background:#141414;border-color:#3b82f6;color:#3b82f6}
.hint{position:fixed;bottom:28px;left:24px;color:#252525;font-size:11px;z-index:100;line-height:1.9}
#cv{display:block;width:100vw;height:calc(100vh - 52px);margin-top:52px;cursor:grab}
#cv:active{cursor:grabbing}
.fe{stroke-dasharray:8 5;animation:fl 1.8s linear infinite}
@keyframes fl{to{stroke-dashoffset:-26}}
.ng{cursor:pointer}
.ng:hover .nr{filter:drop-shadow(0 0 14px var(--glow,#3b82f6));stroke-width:2.5}
.ng:hover text{fill:#fff!important}
.tip{position:fixed;background:#0d0d0d;border:1px solid #2a2a2a;color:#bbb;padding:9px 13px;border-radius:8px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;max-width:260px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.tip.on{opacity:1}
</style></head><body>
<div class="bar">
  <div class="bl"><span class="bt">CI/CD Pipeline Comparison</span><span class="bg">GitHub Actions · Jenkins · GitLab CI</span></div>
  <a href="https://barry-patil.github.io/#projects" class="bb">← Portfolio</a>
</div>
<div class="ctrl">
  <button class="cb" id="zi">+</button>
  <button class="cb" id="zo">−</button>
  <button class="cb" id="zr" style="font-size:12px">⌖</button>
</div>
<div class="hint">Scroll to zoom · Drag to pan · Hover nodes for details</div>
<div class="tip" id="tp"></div>
<svg id="cv" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a-blue"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
  <marker id="a-green"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e"/></marker>
  <marker id="a-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f97316"/></marker>
  <marker id="a-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a855f7"/></marker>
  <marker id="a-red"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
  <marker id="a-cyan"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#06b6d4"/></marker>
  <marker id="a-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>
</defs>
<g id="dg">
<path d="M180,66.0 C220.0,66.0 220.0,186.0 260,186.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/>
<path d="M180,186.0 C220.0,186.0 220.0,186.0 260,186.0" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/>
<path d="M180,306.0 C220.0,306.0 220.0,186.0 260,186.0" fill="none" stroke="#f97316" stroke-width="1.5" class="fe" marker-end="url(#a-orange)"/>
<path d="M390,186.0 C425.0,186.0 425.0,186.0 460,186.0" fill="none" stroke="#22c55e" stroke-width="1.5" class="fe" marker-end="url(#a-green)"/>
<path d="M590,186.0 C625.0,186.0 625.0,186.0 660,186.0" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/>
<path d="M790,186.0 C825.0,186.0 825.0,186.0 860,186.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/>
<path d="M930.0,160 C927.5,160 927.5,92 925.0,92" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/><text x="927.5" y="116.0" text-anchor="middle" fill="#444" font-size="10">GHA result</text>
<path d="M930.0,212 C927.5,212 927.5,280 925.0,280" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/><text x="927.5" y="236.0" text-anchor="middle" fill="#444" font-size="10">Jenkins result</text>
<g class="ng" data-tip="GitHub Actions — zero infra, hosted ubuntu-latest runners, ~22s cold start, native Actions marketplace" style="--glow:#3b82f6"><rect class="nr" x="40" y="40" width="140" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="110.0" y="63.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">GitHub</text><text x="110.0" y="78.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Actions</text></g>
<g class="ng" data-tip="Jenkins on EC2 spot — max plugin flexibility, ~45s cold start, infra overhead for maintenance" style="--glow:#ef4444"><rect class="nr" x="40" y="160" width="140" height="52" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1.5"/><text x="110.0" y="183.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">Jenkins</text><text x="110.0" y="198.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">(Self-Hosted)</text></g>
<g class="ng" data-tip="GitLab CI with K8s executor — built-in registry, ~18s cold start, merged SCM + CI in one platform" style="--glow:#f97316"><rect class="nr" x="40" y="280" width="140" height="52" rx="8" fill="#1f1000" stroke="#f97316" stroke-width="1.5"/><text x="110.0" y="303.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">GitLab CI</text><text x="110.0" y="318.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">(K8s Executor)</text></g>
<g class="ng" data-tip="Unit + integration tests — identical across all three pipelines; same Go microservice test suite" style="--glow:#22c55e"><rect class="nr" x="260" y="160" width="130" height="52" rx="8" fill="#0a1f12" stroke="#22c55e" stroke-width="1.5"/><text x="325.0" y="183.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">Test</text><text x="325.0" y="198.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">Stage</text></g>
<g class="ng" data-tip="Semgrep SAST + Trivy image scan — shared security gate, fails pipeline on CRITICAL CVE" style="--glow:#ef4444"><rect class="nr" x="460" y="160" width="130" height="52" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1.5"/><text x="525.0" y="183.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">SAST</text><text x="525.0" y="198.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">+ Trivy</text></g>
<g class="ng" data-tip="Docker buildx multi-arch build, push to ECR — image tagged with git SHA for full traceability" style="--glow:#3b82f6"><rect class="nr" x="660" y="160" width="130" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="725.0" y="183.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Build</text><text x="725.0" y="198.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">+ Push</text></g>
<g class="ng" data-tip="Helm upgrade --atomic to EKS — same chart across all three pipelines, rollback on failure" style="--glow:#a855f7"><rect class="nr" x="860" y="160" width="140" height="52" rx="8" fill="#150a28" stroke="#a855f7" stroke-width="1.5"/><text x="930.0" y="183.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">Deploy</text><text x="930.0" y="198.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">(Helm → EKS)</text></g>
<g class="ng" data-tip="GitHub Actions total pipeline: 4 min 12 sec avg across 3 runs — fastest managed option" style="--glow:#3b82f6"><rect class="nr" x="860" y="40" width="130" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="925.0" y="63.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">4m 12s</text><text x="925.0" y="78.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">total</text></g>
<g class="ng" data-tip="Jenkins total pipeline: 6 min 05 sec avg — slowest due to agent spin-up and plugin overhead" style="--glow:#ef4444"><rect class="nr" x="860" y="280" width="130" height="52" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1.5"/><text x="925.0" y="303.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">6m 05s</text><text x="925.0" y="318.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">total</text></g>
</g>
</svg>
<script>
const sv=document.getElementById('cv'),g=document.getElementById('dg'),tp=document.getElementById('tp');
let sc=1,tx=0,ty=0,dr=false,lx=0,ly=0;
function aT(){g.setAttribute('transform',`translate(${tx},${ty}) scale(${sc})`);}
sv.addEventListener('wheel',e=>{e.preventDefault();const r=sv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,d=e.deltaY>0?.88:1.12,ns=Math.max(.1,Math.min(6,sc*d));tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;aT();},{passive:false});
sv.addEventListener('mousedown',e=>{if(!e.target.closest('.ng')){dr=true;lx=e.clientX;ly=e.clientY;}});
window.addEventListener('mousemove',e=>{if(!dr)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;aT();});
window.addEventListener('mouseup',()=>dr=false);
document.getElementById('zi').onclick=()=>{sc=Math.min(6,sc*1.2);aT();};
document.getElementById('zo').onclick=()=>{sc=Math.max(.1,sc/1.2);aT();};
document.getElementById('zr').onclick=()=>{sc=1;tx=0;ty=0;aT();};
window.addEventListener('load',()=>{const b=g.getBBox(),sw=sv.clientWidth,sh=sv.clientHeight;sc=Math.min(sw/(b.width+160),sh/(b.height+160),1.5);tx=(sw-b.width*sc)/2-b.x*sc;ty=(sh-b.height*sc)/2-b.y*sc;aT();});
document.querySelectorAll('.ng[data-tip]').forEach(n=>{n.addEventListener('mouseenter',()=>{tp.textContent=n.dataset.tip;tp.classList.add('on');});n.addEventListener('mousemove',e=>{tp.style.left=(e.clientX+16)+'px';tp.style.top=(e.clientY-8)+'px';});n.addEventListener('mouseleave',()=>tp.classList.remove('on'));});
</script></body></html>
