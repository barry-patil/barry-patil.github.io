<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DevSecOps Pipeline — Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif}
.bar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(0,0,0,.95);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;backdrop-filter:blur(12px)}
.bl{display:flex;align-items:center;gap:10px}
.bt{color:#fff;font-size:14px;font-weight:600}
.bg{color:#3b82f6;font-size:11px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);padding:3px 9px;border-radius:4px}
.bb{color:#3b82f6;font-size:13px;text-decoration:none;border:1px solid rgba(59,130,246,.4);padding:7px 16px;border-radius:6px;transition:.2s}
.bb:hover{background:#3b82f6;color:#fff}
.ctrl{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:6px}
.cb{width:36px;height:36px;background:#0d0d0d;border:1px solid #222;border-radius:8px;color:#777;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.cb:hover{background:#141414;border-color:#3b82f6;color:#3b82f6}
.hint{position:fixed;bottom:28px;left:24px;color:#252525;font-size:11px;z-index:100;line-height:1.9}
#cv{display:block;width:100vw;height:calc(100vh - 52px);margin-top:52px;cursor:grab}
#cv:active{cursor:grabbing}
.fe{stroke-dasharray:8 5;animation:fl 1.8s linear infinite}
@keyframes fl{to{stroke-dashoffset:-26}}
.ng{cursor:pointer}
.ng:hover .nr{filter:drop-shadow(0 0 14px var(--glow,#3b82f6));stroke-width:2.5}
.ng:hover text{fill:#fff!important}
.tip{position:fixed;background:#0d0d0d;border:1px solid #2a2a2a;color:#bbb;padding:9px 13px;border-radius:8px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;max-width:260px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.tip.on{opacity:1}
</style></head><body>
<div class="bar">
  <div class="bl"><span class="bt">DevSecOps Pipeline</span><span class="bg">GitHub Actions · Trivy · SAST · EKS</span></div>
  <a href="https://barry-patil.github.io/#projects" class="bb">← Portfolio</a>
</div>
<div class="ctrl">
  <button class="cb" id="zi">+</button>
  <button class="cb" id="zo">−</button>
  <button class="cb" id="zr" style="font-size:12px">⌖</button>
</div>
<div class="hint">Scroll to zoom · Drag to pan · Hover nodes for details</div>
<div class="tip" id="tp"></div>
<svg id="cv" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a-blue"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
  <marker id="a-green"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e"/></marker>
  <marker id="a-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f97316"/></marker>
  <marker id="a-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a855f7"/></marker>
  <marker id="a-red"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
  <marker id="a-cyan"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#06b6d4"/></marker>
  <marker id="a-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>
</defs>
<g id="dg">
<path d="M170,166.0 C205.0,166.0 205.0,86.0 240,86.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/>
<path d="M170,166.0 C205.0,166.0 205.0,246.0 240,246.0" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/><text x="205.0" y="196.0" text-anchor="middle" fill="#444" font-size="10">scan source</text>
<path d="M380,86.0 C420.0,86.0 420.0,166.0 460,166.0" fill="none" stroke="#22c55e" stroke-width="1.5" class="fe" marker-end="url(#a-green)"/>
<path d="M380,246.0 C420.0,246.0 420.0,166.0 460,166.0" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/><text x="420.0" y="196.0" text-anchor="middle" fill="#444" font-size="10">pass gate</text>
<path d="M600,166.0 C640.0,166.0 640.0,86.0 680,86.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/><text x="640.0" y="116.0" text-anchor="middle" fill="#444" font-size="10">scan image</text>
<path d="M600,166.0 C640.0,166.0 640.0,246.0 680,246.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/>
<path d="M750.0,112 C750.0,112 750.0,220 750.0,220" fill="none" stroke="#ef4444" stroke-width="1.5" class="fe" marker-end="url(#a-red)"/><text x="750.0" y="156.0" text-anchor="middle" fill="#444" font-size="10">sign + push</text>
<path d="M820,246.0 C860.0,246.0 860.0,86.0 900,86.0" fill="none" stroke="#f97316" stroke-width="1.5" class="fe" marker-end="url(#a-orange)"/>
<path d="M970.0,112 C970.0,112 970.0,220 970.0,220" fill="none" stroke="#a855f7" stroke-width="1.5" class="fe" marker-end="url(#a-purple)"/><text x="970.0" y="156.0" text-anchor="middle" fill="#444" font-size="10">deploy</text>
<g class="ng" data-tip="Developer pushes code or opens a PR — GitHub Actions trigger immediately on both events" style="--glow:#3b82f6"><rect class="nr" x="40" y="140" width="130" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="105.0" y="163.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Git Push</text><text x="105.0" y="178.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">/ PR</text></g>
<g class="ng" data-tip="pytest + golangci-lint — runs in parallel; failure blocks the pipeline before any build step" style="--glow:#22c55e"><rect class="nr" x="240" y="60" width="140" height="52" rx="8" fill="#0a1f12" stroke="#22c55e" stroke-width="1.5"/><text x="310.0" y="83.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">Unit Tests</text><text x="310.0" y="98.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">+ Lint</text></g>
<g class="ng" data-tip="Semgrep SAST — scans source for SQL injection, hardcoded secrets, insecure deserialization patterns" style="--glow:#ef4444"><rect class="nr" x="240" y="220" width="140" height="52" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1.5"/><text x="310.0" y="243.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">SAST</text><text x="310.0" y="258.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">(Semgrep)</text></g>
<g class="ng" data-tip="Multi-stage Dockerfile — distroless base image, build args from Vault, no root user" style="--glow:#3b82f6"><rect class="nr" x="460" y="140" width="140" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="530.0" y="163.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Docker</text><text x="530.0" y="178.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Build</text></g>
<g class="ng" data-tip="Trivy scans built image for CVEs — CRITICAL/HIGH blocks push; results posted to PR as comment" style="--glow:#ef4444"><rect class="nr" x="680" y="60" width="140" height="52" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1.5"/><text x="750.0" y="83.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">Trivy</text><text x="750.0" y="98.75" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="500">Image Scan</text></g>
<g class="ng" data-tip="Amazon ECR — stores signed images with Cosign; image tag = git SHA for traceability" style="--glow:#f97316"><rect class="nr" x="680" y="220" width="140" height="52" rx="8" fill="#1f1000" stroke="#f97316" stroke-width="1.5"/><text x="750.0" y="243.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">ECR</text><text x="750.0" y="258.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">Registry</text></g>
<g class="ng" data-tip="Helm upgrade with --atomic — auto-rolls back if health checks fail within 3 minutes" style="--glow:#a855f7"><rect class="nr" x="900" y="60" width="140" height="52" rx="8" fill="#150a28" stroke="#a855f7" stroke-width="1.5"/><text x="970.0" y="83.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">Helm</text><text x="970.0" y="98.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">Deploy</text></g>
<g class="ng" data-tip="EKS production cluster — blue/green namespaces, ArgoCD sync, PodDisruptionBudget enforced" style="--glow:#3b82f6"><rect class="nr" x="900" y="220" width="140" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="970.0" y="243.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">EKS</text><text x="970.0" y="258.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">(Production)</text></g>
</g>
</svg>
<script>
const sv=document.getElementById('cv'),g=document.getElementById('dg'),tp=document.getElementById('tp');
let sc=1,tx=0,ty=0,dr=false,lx=0,ly=0;
function aT(){g.setAttribute('transform',`translate(${tx},${ty}) scale(${sc})`);}
sv.addEventListener('wheel',e=>{e.preventDefault();const r=sv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,d=e.deltaY>0?.88:1.12,ns=Math.max(.1,Math.min(6,sc*d));tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;aT();},{passive:false});
sv.addEventListener('mousedown',e=>{if(!e.target.closest('.ng')){dr=true;lx=e.clientX;ly=e.clientY;}});
window.addEventListener('mousemove',e=>{if(!dr)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;aT();});
window.addEventListener('mouseup',()=>dr=false);
document.getElementById('zi').onclick=()=>{sc=Math.min(6,sc*1.2);aT();};
document.getElementById('zo').onclick=()=>{sc=Math.max(.1,sc/1.2);aT();};
document.getElementById('zr').onclick=()=>{sc=1;tx=0;ty=0;aT();};
window.addEventListener('load',()=>{const b=g.getBBox(),sw=sv.clientWidth,sh=sv.clientHeight;sc=Math.min(sw/(b.width+160),sh/(b.height+160),1.5);tx=(sw-b.width*sc)/2-b.x*sc;ty=(sh-b.height*sc)/2-b.y*sc;aT();});
document.querySelectorAll('.ng[data-tip]').forEach(n=>{n.addEventListener('mouseenter',()=>{tp.textContent=n.dataset.tip;tp.classList.add('on');});n.addEventListener('mousemove',e=>{tp.style.left=(e.clientX+16)+'px';tp.style.top=(e.clientY-8)+'px';});n.addEventListener('mouseleave',()=>tp.classList.remove('on'));});
</script></body></html>
