<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EKS Production Setup — Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif}
.bar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(0,0,0,.95);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;backdrop-filter:blur(12px)}
.bl{display:flex;align-items:center;gap:10px}
.bt{color:#fff;font-size:14px;font-weight:600}
.bg{color:#3b82f6;font-size:11px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);padding:3px 9px;border-radius:4px}
.bb{color:#3b82f6;font-size:13px;text-decoration:none;border:1px solid rgba(59,130,246,.4);padding:7px 16px;border-radius:6px;transition:.2s}
.bb:hover{background:#3b82f6;color:#fff}
.ctrl{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:6px}
.cb{width:36px;height:36px;background:#0d0d0d;border:1px solid #222;border-radius:8px;color:#777;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.cb:hover{background:#141414;border-color:#3b82f6;color:#3b82f6}
.hint{position:fixed;bottom:28px;left:24px;color:#252525;font-size:11px;z-index:100;line-height:1.9}
#cv{display:block;width:100vw;height:calc(100vh - 52px);margin-top:52px;cursor:grab}
#cv:active{cursor:grabbing}
.fe{stroke-dasharray:8 5;animation:fl 1.8s linear infinite}
@keyframes fl{to{stroke-dashoffset:-26}}
.ng{cursor:pointer}
.ng:hover .nr{filter:drop-shadow(0 0 14px var(--glow,#3b82f6));stroke-width:2.5}
.ng:hover text{fill:#fff!important}
.tip{position:fixed;background:#0d0d0d;border:1px solid #2a2a2a;color:#bbb;padding:9px 13px;border-radius:8px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;max-width:260px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.tip.on{opacity:1}
</style></head><body>
<div class="bar">
  <div class="bl"><span class="bt">EKS Production Setup</span><span class="bg">EKS · Terraform · IRSA · Autoscaler</span></div>
  <a href="https://barry-patil.github.io/#projects" class="bb">← Portfolio</a>
</div>
<div class="ctrl">
  <button class="cb" id="zi">+</button>
  <button class="cb" id="zo">−</button>
  <button class="cb" id="zr" style="font-size:12px">⌖</button>
</div>
<div class="hint">Scroll to zoom · Drag to pan · Hover nodes for details</div>
<div class="tip" id="tp"></div>
<svg id="cv" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a-blue"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
  <marker id="a-green"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e"/></marker>
  <marker id="a-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f97316"/></marker>
  <marker id="a-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a855f7"/></marker>
  <marker id="a-red"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
  <marker id="a-cyan"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#06b6d4"/></marker>
  <marker id="a-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>
</defs>
<g id="dg">
<path d="M170,166.0 C205.0,166.0 205.0,166.0 240,166.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/>
<path d="M390,166.0 C425.0,166.0 425.0,86.0 460,86.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/><text x="425.0" y="116.0" text-anchor="middle" fill="#444" font-size="10">schedule</text>
<path d="M390,166.0 C425.0,166.0 425.0,246.0 460,246.0" fill="none" stroke="#3b82f6" stroke-width="1.5" class="fe" marker-end="url(#a-blue)"/>
<path d="M610,86.0 C650.0,86.0 650.0,86.0 690,86.0" fill="none" stroke="#06b6d4" stroke-width="1.5" class="fe" marker-end="url(#a-cyan)"/>
<path d="M610,246.0 C650.0,246.0 650.0,246.0 690,246.0" fill="none" stroke="#22c55e" stroke-width="1.5" class="fe" marker-end="url(#a-green)"/><text x="650.0" y="236.0" text-anchor="middle" fill="#444" font-size="10">scale events</text>
<path d="M840,86.0 C880.0,86.0 880.0,166.0 920,166.0" fill="none" stroke="#f97316" stroke-width="1.5" class="fe" marker-end="url(#a-orange)"/>
<path d="M840,246.0 C880.0,246.0 880.0,166.0 920,166.0" fill="none" stroke="#a855f7" stroke-width="1.5" class="fe" marker-end="url(#a-purple)"/>
<g class="ng" data-tip="VPC across 3 AZs — private subnets for nodes, public subnets for ALB only, NAT Gateway per AZ" style="--glow:#3b82f6"><rect class="nr" x="40" y="140" width="130" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="105.0" y="163.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">VPC</text><text x="105.0" y="178.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">3 AZs</text></g>
<g class="ng" data-tip="EKS managed control plane — Kubernetes 1.29, private API endpoint, envelope encryption with KMS" style="--glow:#3b82f6"><rect class="nr" x="240" y="140" width="150" height="52" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/><text x="315.0" y="163.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">EKS Control</text><text x="315.0" y="178.75" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">Plane</text></g>
<g class="ng" data-tip="System node group — on-demand m6i.xlarge, runs kube-system, monitoring, ingress controllers" style="--glow:#06b6d4"><rect class="nr" x="460" y="60" width="150" height="52" rx="8" fill="#051520" stroke="#06b6d4" stroke-width="1.5"/><text x="535.0" y="83.75" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="500">System</text><text x="535.0" y="98.75" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="500">Node Group</text></g>
<g class="ng" data-tip="App node group — spot + on-demand mix, Karpenter for provisioning, bin-packing strategy" style="--glow:#22c55e"><rect class="nr" x="460" y="220" width="150" height="52" rx="8" fill="#0a1f12" stroke="#22c55e" stroke-width="1.5"/><text x="535.0" y="243.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">App</text><text x="535.0" y="258.75" text-anchor="middle" fill="#86efac" font-size="12" font-weight="500">Node Group</text></g>
<g class="ng" data-tip="IAM Roles for Service Accounts — each pod gets a scoped IAM role via OIDC, zero node-level credentials" style="--glow:#f97316"><rect class="nr" x="690" y="60" width="150" height="52" rx="8" fill="#1f1000" stroke="#f97316" stroke-width="1.5"/><text x="765.0" y="83.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">IRSA</text><text x="765.0" y="98.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">(Pod IAM)</text></g>
<g class="ng" data-tip="Cluster Autoscaler with least-waste expander — scales node groups within 2 minutes of pending pods" style="--glow:#a855f7"><rect class="nr" x="690" y="220" width="150" height="52" rx="8" fill="#150a28" stroke="#a855f7" stroke-width="1.5"/><text x="765.0" y="243.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">Cluster</text><text x="765.0" y="258.75" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">Autoscaler</text></g>
<g class="ng" data-tip="AWS Load Balancer Controller — provisions ALBs per Ingress, TLS termination via ACM, WAF attached" style="--glow:#f97316"><rect class="nr" x="920" y="140" width="150" height="52" rx="8" fill="#1f1000" stroke="#f97316" stroke-width="1.5"/><text x="995.0" y="163.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">AWS ALB</text><text x="995.0" y="178.75" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="500">Ingress</text></g>
</g>
</svg>
<script>
const sv=document.getElementById('cv'),g=document.getElementById('dg'),tp=document.getElementById('tp');
let sc=1,tx=0,ty=0,dr=false,lx=0,ly=0;
function aT(){g.setAttribute('transform',`translate(${tx},${ty}) scale(${sc})`);}
sv.addEventListener('wheel',e=>{e.preventDefault();const r=sv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,d=e.deltaY>0?.88:1.12,ns=Math.max(.1,Math.min(6,sc*d));tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;aT();},{passive:false});
sv.addEventListener('mousedown',e=>{if(!e.target.closest('.ng')){dr=true;lx=e.clientX;ly=e.clientY;}});
window.addEventListener('mousemove',e=>{if(!dr)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;aT();});
window.addEventListener('mouseup',()=>dr=false);
document.getElementById('zi').onclick=()=>{sc=Math.min(6,sc*1.2);aT();};
document.getElementById('zo').onclick=()=>{sc=Math.max(.1,sc/1.2);aT();};
document.getElementById('zr').onclick=()=>{sc=1;tx=0;ty=0;aT();};
window.addEventListener('load',()=>{const b=g.getBBox(),sw=sv.clientWidth,sh=sv.clientHeight;sc=Math.min(sw/(b.width+160),sh/(b.height+160),1.5);tx=(sw-b.width*sc)/2-b.x*sc;ty=(sh-b.height*sc)/2-b.y*sc;aT();});
document.querySelectorAll('.ng[data-tip]').forEach(n=>{n.addEventListener('mouseenter',()=>{tp.textContent=n.dataset.tip;tp.classList.add('on');});n.addEventListener('mousemove',e=>{tp.style.left=(e.clientX+16)+'px';tp.style.top=(e.clientY-8)+'px';});n.addEventListener('mouseleave',()=>tp.classList.remove('on'));});
</script></body></html>
